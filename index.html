<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixium Lab | UI/UX Portfolio</title>
    
    <!-- Google Fonts: Inter for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a; /* Dark theme focus[cite: 7, 14] */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Navigation Style */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,1), rgba(10,10,10,0));
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span {
            color: #abe048; /* Mixium Lab's signature green[cite: 13] */
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: radial-gradient(circle at 80% 20%, #1a1a1a 0%, #0a0a0a 100%);
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #abe048;
            margin-bottom: 30px;
            width: fit-content;
        }

        h1 {
            font-size: clamp(50px, 12vw, 150px);
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .outline-text {
            color: transparent;
            -webkit-text-stroke: 2px #abe048; /* Beyond limits style[cite: 13] */
            font-style: italic;
        }

        p.description {
            max-width: 500px;
            font-size: 18px;
            line-height: 1.6;
            color: #888;
            margin-top: 40px;
            border-left: 2px solid #abe048;
            padding-left: 20px;
        }

        /* Button Group */
        .cta-group {
            margin-top: 50px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .btn-primary {
            background-color: #abe048;
            color: #000;
        }

        .btn-primary:hover {
            background-color: #fff;
            transform: translateY(-5px);
        }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .hero { padding: 0 5%; }
            h1 { font-size: 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MIXIUM LAB<span>.</span></div>
        <div class="nav-links">
            <!-- Add nav links here if needed -->
        </div>
    </nav>

    <section class="hero">
        <div class="badge">Creative Design Agency</div>
        <h1>
            Creative <br>
            <span class="outline-text">Beyond</span> <br>
            Limits<span>.</span>
        </h1>
        
        <p class="description">
            We create digital experiences that look beautiful, feel smooth, and help brands grow with clear strategy and bold design[cite: 13].
        </p>

        <div class="cta-group">
            <a href="#" class="btn btn-primary">Start a Project</a>
            <a href="#" class="btn btn-secondary">View Work</a>
        </div>
    </section>

</body>
</html>
